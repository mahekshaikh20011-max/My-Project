  <main class="main">
    <!-- Page Title -->
    <div class="page-title">
      <div class="heading">
        <div class="container">
          <div class="row d-flex justify-content-center text-center">
            <div class="col-lg-8">
              <h1>Appointment</h1>
              <p>"Your health and time are our top priorities. Schedule your appointment in just a few simple steps."</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Appointment Section -->
    <section id="appointment" class="appointment section">
      <div class="container" data-aos="fade-up" data-aos-delay="100">
        <div class="row">
          <div class="col-lg-8 mx-auto">
            <div class="appointment-form" data-aos="fade-up" data-aos-delay="400" style="background: #f7f9fc; padding: 40px; border-radius: 10px; box-shadow: 0px 5px 25px rgba(0, 0, 0, 0.1);">
              
              <!-- Python Backend Route Connection -->
              <form action="/book_appointment" method="POST">
                <div class="row gy-4">
                  <div class="col-md-6">
                    <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                  </div>
                  <div class="col-md-6">
                    <input type="email" name="email" class="form-control" placeholder="Email Address" required>
                  </div>
                  <div class="col-md-6">
                    <input type="tel" name="phone" class="form-control" placeholder="Phone Number" required>
                  </div>
                  <div class="col-md-6">
                    <select name="department" class="form-select" required>
                      <option value="">Select Department</option>
                      <option value="General Consultation">General Consultation</option>
                      <option value="Cardiology">Cardiology</option>
                      <option value="Neurology">Neurology</option>
                      <option value="Orthopedics">Orthopedics</option>
                      <option value="Pediatrics">Pediatrics</option>
                    </select>
                  </div>
                  <div class="col-md-12">
                    <label for="date" class="form-label">Preferred Appointment Date</label>
                    <input type="date" name="date" class="form-control" required>
                  </div>
                  <div class="col-md-12">
                    <textarea class="form-control" name="message" rows="4" placeholder="Additional Message (Optional)"></textarea>
                  </div>
                  <div class="col-md-12 text-center">
                    <button type="submit" class="btn btn-primary" style="background: #1977cc; border: 0; padding: 12px 40px; color: #fff; border-radius: 50px;">Book Appointment</button>
                  </div>
                </div>
              </form>
              
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
